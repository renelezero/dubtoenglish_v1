<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ein Americy — MENA Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>Ein <span class="hl">Americy</span></h1>
      <span class="tagline">MENA Intelligence</span>
    </div>
    <div class="header-right">
      <div id="connIndicator" class="status-indicator offline">
        <span class="status-dot"></span>
        <span id="connText">Connecting...</span>
      </div>
      <button id="btnVoice" class="btn-voice" title="Toggle AI voice">
        <span class="voice-icon">&#9834;</span> Voice
      </button>
    </div>
  </header>

  <main>
    <div class="dashboard">
      <!-- Map -->
      <div class="panel panel-map">
        <div id="map"></div>
      </div>

      <!-- Right column -->
      <div class="right-col">
        <!-- Live Feed -->
        <div class="panel panel-feed">
          <div class="panel-header">
            <h2>Live Feed</h2>
            <span id="feedCount" class="badge">0</span>
          </div>
          <div id="feedContent" class="feed-scroll">
            <div class="empty-state">Scanning sources...</div>
          </div>
        </div>

        <!-- AI Briefing -->
        <div class="panel panel-briefing">
          <div class="panel-header">
            <h2>AI Briefing</h2>
            <span id="briefingMeta" class="meta">Waiting for data...</span>
          </div>
          <div id="briefingContent" class="briefing-scroll">
            <div class="empty-state">Briefing will appear here...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">Events</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statSources">0</span>
        <span class="stat-label">Sources</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statTopLocation">—</span>
        <span class="stat-label">Top Location</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statCritical">0</span>
        <span class="stat-label">Critical</span>
      </div>
      <div class="stat stat-chart">
        <canvas id="timelineChart" height="32"></canvas>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
